# decision-tracking-manager opt-in for earlbear-blog.
# The anchor engine + freshness hook ship in the plugin; this file turns them on
# for THIS repo and points them at blog's why-docs. (Engine retired from
# scripts/features_lib.py — see scripts/features_check.py shim.)
ENABLE=1
OWNER=EarlBear
REPO=blog
ANCHORS_DIR=docs/features
# Blog's "why" is written as per-feature docs under docs/features/, not a single
# decisions.md — leave DECISIONS_FILE at its default; anchors are the source of truth here.
